<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium GST Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>GST <span class="accent">Calculator</span></h1>
            <p>Precise financial calculations for your business</p>
        </header>

        <main class="calculator-card">
            <div class="input-group">
                <label for="amount">Original Amount (₹)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>

            <div class="input-group">
                <label>Tax Rate (%)</label>
                <div class="rate-buttons">
                    <button class="rate-btn" data-rate="5">5%</button>
                    <button class="rate-btn" data-rate="12">12%</button>
                    <button class="rate-btn" data-rate="18" class="active">18%</button>
                    <button class="rate-btn" data-rate="28">28%</button>
                    <input type="number" id="customRate" placeholder="Custom %" class="custom-rate-input">
                </div>
            </div>

            <div class="toggle-group">
                <span>GST Exclusive</span>
                <label class="switch">
                    <input type="checkbox" id="taxMode">
                    <span class="slider round"></span>
                </label>
                <span>GST Inclusive</span>
            </div>

            <div class="results-container">
                <div class="result-item">
                    <span class="label">Net Amount:</span>
                    <span class="value" id="netAmount">₹ 0.00</span>
                </div>
                <div class="result-item">
                    <span class="label" id="taxLabel">GST (18%):</span>
                    <span class="value accent" id="taxAmount">₹ 0.00</span>
                </div>
                <div class="divider"></div>
                <div class="result-item total">
                    <span class="label">Total Amount:</span>
                    <span class="value" id="totalAmount">₹ 0.00</span>
                </div>
            </div>

            <div class="breakdown">
                <div class="breakdown-item">
                    <span>CGST (Central):</span>
                    <span id="cgst">₹ 0.00</span>
                </div>
                <div class="breakdown-item">
                    <span>SGST/UTGST (State):</span>
                    <span id="sgst">₹ 0.00</span>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Professional Tax Suite. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
